<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Cloudybear ☁️🤍</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#ffe4ec,#fff1f6);
  color:#ff5c8a;
  overflow:hidden;
}
.sky{position:fixed;inset:0;z-index:-1}
.cloud{
  position:absolute;width:220px;height:70px;
  background:#fff;border-radius:50px;opacity:.5;
  top:20%;animation:cloud 60s linear infinite;
}
.cloud::before,.cloud::after{
  content:"";position:absolute;background:#fff;
  width:80px;height:80px;border-radius:50%;top:-35px;
}
.cloud::before{left:30px}.cloud::after{right:30px}
.cloud.c2{top:45%;animation-duration:90s;opacity:.35}
.cloud.c3{top:70%;animation-duration:75s;opacity:.4}
@keyframes cloud{from{left:-300px}to{left:110%}}

.page{display:none;min-height:100vh;justify-content:center;align-items:center}
.page.active{display:flex}
.card{
  background:#fff;padding:30px;border-radius:24px;
  box-shadow:0 12px 30px rgba(255,92,138,.25);
  max-width:520px;text-align:center
}
button,input{
  margin-top:15px;padding:10px 20px;
  border:none;border-radius:20px;font-size:1em
}
button{background:#ff7aa2;color:#fff;cursor:pointer}
input{text-align:center;width:80%}

.confetti{
  position:fixed;top:-10px;width:10px;height:10px;
  animation:fall 3s linear forwards
}
@keyframes fall{to{transform:translateY(110vh) rotate(360deg);opacity:0}}
</style>
</head>

<body>

<div class="sky">
  <div class="cloud"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>
</div>

<audio id="tapSound" src="https://www.soundjay.com/buttons/sounds/button-09.mp3"></audio>

<div class="page active">
  <div class="card">
    <h2>Hai ☁️</h2>
    <p>aku boleh panggil kamu apa?</p>
    <input id="loverName" placeholder="namamu 🤍">
    <button onclick="saveName()">masuk</button>
  </div>
</div>

<div class="page">
  <div class="card">
    <h2>🦸 Tebak siapa aku?</h2>
    <p id="heroClue"></p>
    <button onclick="guessHero()">jawab</button>
    <p id="heroMsg"></p>
    <button id="heroNext" style="display:none" onclick="next()">lanjut</button>
  </div>
</div>

<div class="page">
  <div class="card">
    <h2>✨ Buat Kamu</h2>
    <p id="finalMessage"></p>
    <button onclick="reset()">ulang lagi</button>
  </div>
</div>

<script>
const pages=document.querySelectorAll(".page");
let p=0,lover="",playCount=0;

/* ===== HERO ===== */
const heroes=[
 {name:"Iron Man",clues:["Teknologi.","Manusia biasa.","Hati besar."]},
 {name:"Spider-Man",clues:["Lincah.","Gigitan.","Tanggung jawab."]},
 {name:"Thor",clues:["Petir.","Dewa.","Kehilangan."]}
];
let pickedHero,clueIndex=0;

function pickHero(){
  pickedHero=heroes[Math.floor(Math.random()*heroes.length)];
  clueIndex=0;
}

function normalize(s){return s.toLowerCase().replace(/[^a-z]/g,"")}

function saveName(){
  lover=loverName.value||"kamu";
  next();
}

function guessHero(){
  if(playCount>=1){
    heroClue.innerText="Kali ini bukan soal superhero.";
    heroMsg.innerHTML="Jawabannya kamu 🤍";
    heroNext.style.display="inline-block";
    confetti();
    return;
  }

  const i=prompt("siapa?");
  if(!i)return;
  if(normalize(i).includes(normalize(pickedHero.name))){
    heroMsg.innerHTML="Benar 🤍";
    heroNext.style.display="inline-block";
    confetti();
  }else{
    clueIndex++;
    heroMsg.innerText="salah… tapi aku tunggu 🤏";
    if(clueIndex<pickedHero.clues.length)
      heroClue.innerText=pickedHero.clues[clueIndex];
  }
}

function next(){
  pages[p].classList.remove("active");
  p++; pages[p].classList.add("active");

  if(p===1){
    pickHero();
    heroClue.innerText=
      playCount>=1
      ?"Aku capek bersembunyi."
      :pickedHero.clues[0];
    heroMsg.innerText="";
    heroNext.style.display="none";
  }

  if(p===2){
    finalMessage.innerText=
      playCount>=1
      ?`${lover}, dari awal aku berharap kamu peka bukan ke hero… tapi ke aku 🤍`
      :"Terima kasih sudah sampai sini 🤍";
  }
}

function reset(){
  playCount++;
  pages[p].classList.remove("active");
  p=0; pages[p].classList.add("active");
}

/* ===== CONFETTI ===== */
function confetti(){
  for(let i=0;i<40;i++){
    const c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.background=["#ff7aa2","#ffd1dc","#b2f2bb"][Math.random()*3|0];
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3000);
  }
}
</script>
</body>
</html>
